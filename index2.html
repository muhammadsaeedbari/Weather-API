<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weater API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- <div class="window"> -->
            <div class="search">
                <input type="text" class="inp_city" placeholder="Enter City Name">
            <button class="btn-search">
                &#128269;
            </button>
            </div>

            <div class="masterbox">
            <div class="data">
                
                <img src="" alt="">
               
                <input type="text" class="temp" readonly placeholder=" 0 °C">

            </div>

            <div class="master_details">
                
                <div class="air_pressure">
                    <img class="air_pressure_img" src="./images/wind.png" alt="">
                    <input type="text" class="air" id="airnum" placeholder=" 0 km/h">
                </div> 
                <div class="humidity">
                    <img class="humidity_img" src="./images/humidity.png " alt="">
                    <input type="text" class="humid" id="humidnum" placeholder=" 0 %"> 
                </div>
               
            </div>

            </div>
        <!-- </div> -->
    </div>
    
</body>
<script src="app.js"></script>
</html>
